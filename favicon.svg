<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" width="128" height="148">
  <defs>
    <style>
      /* Change fill values to #FFFFFF variants for dark mode */
      .label { font-family: Arial Black, sans-serif; font-weight: 900; fill: #2575C4; font-size: 18px; letter-spacing: 2px; }
    </style>
    <clipPath id="shield-clip">
      <path d="M64 4 L116 24 L116 80 Q116 118 64 140 Q12 118 12 80 L12 24 Z"/>
    </clipPath>
  </defs>

  <!-- Shield base -->
  <path d="M64 4 L116 24 L116 80 Q116 118 64 140 Q12 118 12 80 L12 24 Z" fill="#ffffff" stroke="#2575C4" stroke-width="3"/>

  <!-- Quadrant fills clipped to shield -->
  <!-- White mana - top left - sky blue -->
  <rect x="12" y="4" width="52" height="68" fill="#69B4E0" clip-path="url(#shield-clip)"/>
  <!-- Blue mana - top right - blue -->
  <rect x="64" y="4" width="52" height="68" fill="#2575C4" clip-path="url(#shield-clip)"/>
  <!-- Green mana - bottom left - green -->
  <rect x="12" y="72" width="52" height="68" fill="#4A9B4A" clip-path="url(#shield-clip)"/>
  <!-- Red mana - bottom center -->
  <rect x="38" y="72" width="52" height="68" fill="#D94F2B" clip-path="url(#shield-clip)"/>
  <!-- Black mana - bottom right - dark gray -->
  <rect x="64" y="72" width="52" height="68" fill="#3A3A3A" clip-path="url(#shield-clip)"/>

  <!-- White mana sun symbol (top-left) -->
  <g transform="translate(34, 42)" fill="#FFFFFF" opacity="0.95">
    <circle cx="0" cy="0" r="7"/>
    <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-13" x2="0" y2="-9"/>
      <line x1="0" y1="9" x2="0" y2="13"/>
      <line x1="-13" y1="0" x2="-9" y2="0"/>
      <line x1="9" y1="0" x2="13" y2="0"/>
      <line x1="-9" y1="-9" x2="-6.5" y2="-6.5"/>
      <line x1="6.5" y1="-6.5" x2="9" y2="-9"/>
      <line x1="-9" y1="9" x2="-6.5" y2="6.5"/>
      <line x1="6.5" y1="6.5" x2="9" y2="9"/>
    </g>
  </g>

  <!-- Blue mana water drop (top-right) -->
  <g transform="translate(92, 38)" fill="#FFFFFF" opacity="0.95">
    <path d="M0 -14 C-2 -8, -10 -2, -10 5 A10 10 0 0 0 10 5 C10 -2, 2 -8, 0 -14 Z"/>
  </g>

  <!-- Green mana tree (bottom-left) -->
  <g transform="translate(34, 98)" fill="#FFFFFF" opacity="0.95">
    <polygon points="0,-14 -10,2 -5,2 -7,14 7,14 5,2 10,2"/>
  </g>

  <!-- Red mana fire/dragon (bottom-center) -->
  <g transform="translate(58, 104)" fill="#FFFFFF" opacity="0.9">
    <path d="M0 -10 C4 -6, 8 0, 6 6 C10 2, 10 -4, 6 -10 C10 -6, 12 2, 8 10 C4 6, -4 6, -8 10 C-12 2, -10 -6, -6 -10 C-10 -4, -10 2, -6 6 C-8 0, -4 -6, 0 -10 Z"/>
  </g>

  <!-- Black mana skull (bottom-right) -->
  <g transform="translate(92, 100)" fill="#000000" opacity="0.85">
    <ellipse cx="0" cy="-4" rx="9" ry="10"/>
    <rect x="-7" y="4" width="14" height="5" rx="1"/>
    <rect x="-5" y="6" width="3" height="5" fill="#3A3A3A"/>
    <rect x="2" y="6" width="3" height="5" fill="#3A3A3A"/>
  </g>

  <!-- Shield outline on top -->
  <path d="M64 4 L116 24 L116 80 Q116 118 64 140 Q12 118 12 80 L12 24 Z" fill="none" stroke="#2575C4" stroke-width="4"/>

  <!-- Center M letter with lightning bolt -->
  <g transform="translate(64, 72)">
    <!-- White backing for M -->
    <rect x="-18" y="-30" width="36" height="40" rx="2" fill="#FFFFFF"/>
    <!-- M letter -->
    <text x="0" y="4" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="38" fill="#2575C4">M</text>
    <!-- Lightning bolt overlay -->
    <path d="M4 -28 L-4 -4 L2 -4 L-4 18 L8 -8 L2 -8 L8 -28 Z" fill="#2575C4" opacity="0.85"/>
  </g>

  <!-- MANAFILES text label -->
  <text x="64" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="16" fill="#2575C4" letter-spacing="2">MANAFILES</text>
</svg>