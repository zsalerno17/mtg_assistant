<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <style>
      /* Primary ink color for light mode */
      /* Change #0A2E6D to #FFFFFF for dark mode */
      .ink {
        fill: #0A2E6D;
      }
    </style>
  </defs>
  <g class="ink" color="#0A2E6D">
    <!-- Ring -->
    <circle
      cx="64"
      cy="64"
      r="44"
      fill="none"
      stroke="currentColor"
      stroke-width="10"
      stroke-linecap="round"
    />
    <!-- Spark: four-pointed star positioned at (92, 28) -->
    <g transform="translate(92, 28)">
      <path d="M0 10 L10 0 L0 -10 L-10 0 Z" />
      <circle cx="0" cy="0" r="3" />
    </g>
  </g>
</svg>